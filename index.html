<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tabata Timer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- CONFIG VIEW -->
  <div id="view-config" class="view active">
    <h1>Tabata Timer</h1>

    <section class="card">
      <h2>Mode</h2>
      <input type="hidden" id="cfg-mode" value="standard" />
      <div class="mode-toggle">
        <button type="button" class="mode-btn active" data-mode="standard">Standard</button>
        <button type="button" class="mode-btn" data-mode="pyramid">Pyramid ▲▼</button>
      </div>
      <p class="mode-hint" id="mode-hint">Cycle through all exercises each round.</p>
    </section>

    <section class="card" id="cfg-rounds-section">
      <h2>Session</h2>
      <label>Rounds
        <input type="number" id="cfg-rounds" min="1" max="99" value="8" />
      </label>
    </section>

    <section class="card">
      <h2>Phases (seconds)</h2>
      <label>Get Ready
        <input type="number" id="cfg-prep" min="0" max="300" value="10" />
      </label>
      <label>Work
        <input type="number" id="cfg-work" min="1" max="300" value="20" />
      </label>
      <label>Rest
        <input type="number" id="cfg-rest" min="0" max="300" value="10" />
      </label>
      <label>Level Break
        <input type="number" id="cfg-break" min="0" max="300" value="60" />
      </label>
    </section>

    <section class="card">
      <h2>Exercises</h2>
      <div id="exercise-list"></div>
      <button class="btn-secondary" id="btn-add-exercise">+ Add Exercise</button>
    </section>

    <div class="file-actions">
      <button class="btn-file" id="btn-load-config">Load Config</button>
      <button class="btn-file" id="btn-save-config">Save Config</button>
    </div>
    <div id="file-status"></div>

    <button class="btn-primary" id="btn-start">Start Session</button>
  </div>

  <!-- TIMER VIEW -->
  <div id="view-timer" class="view">
    <div id="phase-label">GET READY</div>
    <div id="exercise-name"></div>
    <div id="countdown">10</div>
    <div id="level-exercises"></div>
    <div id="progress-info">
      <span id="lbl-round">Round</span> <span id="cur-round">1</span> / <span id="tot-rounds">8</span>
      &nbsp;·&nbsp;
      Exercise <span id="cur-exercise">1</span> / <span id="tot-exercises">1</span>
    </div>

    <div class="timer-controls">
      <button class="btn-secondary" id="btn-pause">Pause</button>
      <button class="btn-secondary" id="btn-reset">Reset</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
